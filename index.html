<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/fretboard/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1612" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/fretboard/icon-192.png" />
    <title>Fretboard</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #1a1612; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
      #app-loading {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100dvh; gap: 12px; color: #e8d5b5; font-family: sans-serif;
      }
      #app-loading .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
      #app-loading .logo span { color: #d4956a; }
      #app-loading .sub { font-size: 10px; color: #555; letter-spacing: 3px; text-transform: uppercase; }
      #root:not(:empty) + #app-loading, #root:not(:empty) ~ #app-loading { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="app-loading">
      <div class="logo"><span>fret</span>board</div>
      <div class="sub">guitar practice companion</div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
